name: CI

on:
  push:
    branches: [main, master, 'feat/**', 'docs/**']
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: apps/api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:coverage
      - run: npm run build

  functions:
    name: apps/functions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/functions/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  docker:
    name: docker build (api)
    runs-on: ubuntu-latest
    needs: [api]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t geoip-api ./apps/api
